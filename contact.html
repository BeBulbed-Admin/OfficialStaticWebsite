<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - BeBulbed</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baumans&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0d0d0d] text-white overflow-x-hidden font-helvetica">

    <div class="top-fade-mask"></div>
    <div class="scrolled-nav-bg"></div>

    <nav class="sticky-nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo-left font-baumans" style="text-decoration: none;"><span class="flip-b">B</span>B</a>
            <div class="nav-right"></div>
        </div>
    </nav>

    <main class="subpage-container">
        <h1 class="subpage-title font-baumans">Contact Us</h1>
        
        <form class="contact-form-wrapper" action="#" method="POST">
            <input type="text" class="form-field" placeholder="Your Name" required>
            <input type="email" class="form-field" placeholder="Email Address" required>
            <textarea class="form-field" placeholder="How can we help you?" required></textarea>
            <button type="submit" class="btn-submit">Send Message</button>
        </form>
    </main>

    </body>
</html>
