<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeBulbed — We are trying to change the way we live.</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css">
</head>
<body class="bg-[#0a0a0b] text-white selection:bg-[#00ffc2] selection:text-black font-['Geist_Sans']">

    <section class="h-[85vh] flex flex-col justify-between p-12">
        <nav class="flex justify-between items-center">
            <span class="text-[9px] font-bold tracking-[0.5em] uppercase opacity-60">BeBulbed</span>
            <div class="h-[1px] w-8 bg-white/20"></div>
        </nav>
        
        <div class="max-w-5xl mx-auto text-center">
            <h1 class="text-5xl md:text-8xl font-light tracking-tighter leading-[0.85]">
                We are trying to <br/>
                <span class="text-zinc-600 italic">change the way we live.</span>
            </h1>
        </div>

        <div class="flex justify-center py-10 opacity-20">
            <div class="w-[1px] h-16 bg-gradient-to-b from-white to-transparent"></div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 py-20">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 auto-rows-[320px]">
            
            <a href="https://social.bebulbed.com" class="bento-card md:col-span-2 md:row-span-2 group">
                <div class="p-12 h-full flex flex-col justify-between">
                    <div>
                        <span class="bento-tag">Subsystem 01</span>
                        <h2 class="text-4xl mt-8 font-medium group-hover:tracking-wider transition-all duration-700">Social</h2>
                    </div>
                    <p class="text-zinc-500 max-w-xs text-sm">Human systems, reimagined for the 21st century.</p>
                </div>
            </a>

            <a href="https://spark.bebulbed.com" class="bento-card md:col-span-2 md:row-span-1 group">
                <div class="p-10 h-full flex flex-col justify-between">
                    <div class="flex justify-between items-start">
                        <h2 class="text-3xl font-medium">Spark</h2>
                        <span class="bento-tag">Subsystem 02</span>
                    </div>
                    <p class="text-zinc-500 text-sm">The experimental engine where research begins.</p>
                </div>
            </a>

            <a href="https://insights.bebulbed.com" class="bento-card md:col-span-1 md:row-span-1 group">
                <div class="p-8 h-full flex flex-col justify-between">
                    <h2 class="text-2xl font-medium">Insights</h2>
                    <div class="h-[1px] w-4 bg-zinc-700 group-hover:w-full transition-all duration-1000"></div>
                </div>
            </a>

            <div class="bento-card md:col-span-1 md:row-span-1 p-8 flex flex-col justify-center text-center bg-zinc-950/40">
                <span class="text-[9px] uppercase tracking-widest opacity-30 mb-2">Established</span>
                <span class="text-2xl font-mono text-zinc-500">01.04.2026</span>
                <div class="mt-4 flex justify-center">
                    <span class="px-2 py-1 border border-white/10 rounded text-[8px] opacity-40 uppercase">ASIC: Active</span>
                </div>
            </div>

        </div>
    </section>

    <footer class="p-16 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-8">
        <span class="text-[10px] tracking-widest opacity-40 uppercase">© 2026 BeBulbed Research</span>
        <div class="flex gap-10 text-[10px] tracking-[0.2em] uppercase opacity-40">
            <a href="privacy.html" class="hover:text-white hover:opacity-100 transition">Privacy</a>
            <a href="mailto:hello@bebulbed.com" class="hover:text-white hover:opacity-100 transition">Contact</a>
        </div>
    </footer>

    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
