<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | BeBulbed</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baumans&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0d0d0d] text-white overflow-x-hidden font-helvetica">

    <nav class="sticky-nav" style="transform: translateY(0); animation: none; background: rgba(17, 17, 17, 0.85);">
        <div class="nav-inner">
            <a href="/" class="nav-logo-left font-baumans" style="text-decoration: none;"><span class="flip-b">B</span>B</a>
            <div class="nav-right">
                <a href="/newsroom" class="nav-link">Newsroom</a>
                <a href="/about" class="nav-link" style="color: #fff;">About</a>
            </div>
        </div>
    </nav>

    <section class="flex flex-col items-center justify-center min-h-screen px-6 text-center">
        <div class="max-w-2xl">
            <h1 class="text-xs uppercase tracking-[0.4em] text-zinc-500 mb-8">About</h1>
            
            <h2 class="text-3xl md:text-4xl font-light mb-12 tracking-tight">
                BeBulbed was founded today, <span class="text-white">April 1, 2026</span>.
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 text-left border-t border-white/10 pt-12">
                <div>
                    <h3 class="text-[10px] uppercase tracking-widest text-zinc-500 mb-2">Entity</h3>
                    <p class="text-lg font-light">BeBulbed</p>
                </div>
                <div>
                    <h3 class="text-[10px] uppercase tracking-widest text-zinc-500 mb-2">Structure</h3>
                    <p class="text-lg font-light">Sole Trader (ASIC Registered)</p>
                </div>
                <div>
                    <h3 class="text-[10px] uppercase tracking-widest text-zinc-500 mb-2">Location</h3>
                    <p class="text-lg font-light">Australia</p>
                </div>
                <div>
                    <h3 class="text-[10px] uppercase tracking-widest text-zinc-500 mb-2">Status</h3>
                    <p class="text-lg font-light">Operational</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer-system" style="opacity: 1; transform: translateY(0); animation: none;">
        <div class="footer-inner">
            <div class="footer-left">
                <span class="footer-text">© 2026</span>
                <span class="footer-logo font-baumans"><span class="flip-b">B</span>eBulbed.</span>
                <span class="footer-text">All rights reserved.</span>
            </div>
            <div class="footer-right">
                <a href="mailto:contact@bebulbed.com" class="footer-text hover:text-white transition-colors">Contact Us</a>
            </div>
        </div>
    </footer>

</body>
</html>
